name: Deploy Backend

on:
  workflow_run:
    workflows: [Upstream Sync]
    types: [completed]
  push:
    tags:
      - "*"
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - uses: pnpm/action-setup@v5
        name: Install pnpm
        id: pnpm-install
        with:
          version: 10
          run_install: false

      - name: Deploy Backend for ${{ github.ref_name }}
        run: |
          export use_worker_assets=${{ secrets.USE_WORKER_ASSETS }}
          export use_worker_assets_with_telegram=${{ secrets.USE_WORKER_ASSETS_WITH_TELEGRAM }}
          
          if [ -n "$use_worker_assets" ]; then
            cd frontend/
            pnpm install --no-frozen-lockfile
            if [ -n "$use_worker_assets_with_telegram" ]; then
              echo "Building with telegram pages"
              pnpm build:telegram:pages
            else
              echo "Building with normal pages"
              pnpm build:pages
            fi
            cd ..
          fi

          export debug_mode=${{ secrets.DEBUG_MODE }}
          export use_mail_wasm_parser=${{ secrets.BACKEND_USE_MAIL_WASM_PARSER }}
          
          cd worker/
          cp wrangler.toml.template wrangler.toml
          if [ -n "$WRANGLER_TOML_CONTENT" ]; then
            printf '%s\n' "$WRANGLER_TOML_CONTENT" > wrangler.toml
          fi

          if [ -n "$ADMIN_PASSWORDS" ]; then
            python - <<'PY'
              from pathlib import Path
              import json
              import os
              import re

              path = Path("wrangler.toml")
              text = path.read_text(encoding="utf-8")
              raw = os.environ["ADMIN_PASSWORDS"].strip()
              if not raw:
                  raise SystemExit(0)

              try:
                  parsed = json.loads(raw)
                  if isinstance(parsed, list):
                      passwords = [item for item in parsed if isinstance(item, str) and item]
                  else:
                      passwords = [raw]
              except Exception:
                  passwords = [raw]

              replacement = f"ADMIN_PASSWORDS = {json.dumps(passwords, ensure_ascii=False)}"
              pattern = re.compile(r"(?m)^\s*ADMIN_PASSWORDS\s*=.*$")
              if pattern.search(text):
                  text = pattern.sub(replacement, text, count=1)
              else:
                  anchor = re.search(r"(?m)^\s*JWT_SECRET\s*=.*$", text)
                  if anchor:
                      insert_at = anchor.end()
                      text = text[:insert_at] + "\n" + replacement + text[insert_at:]
                  else:
                      text = text.rstrip() + "\n" + replacement + "\n"

              path.write_text(text, encoding="utf-8")
            PY
          fi
          
          pnpm install --no-frozen-lockfile

          if [ -n "$use_mail_wasm_parser" ]; then
            echo "Using mail-parser-wasm-worker"
            pnpm add mail-parser-wasm-worker
            git apply ../.github/config/mail-parser-wasm-worker.patch
            echo "Applied mail-parser-wasm-worker patch"
          fi

          if [ "$debug_mode" = "true" ]; then
            pnpm run deploy
          else
            if pnpm run deploy >/dev/null 2>&1; then
              echo "Deploy succeeded"
            else
              code=$?
              echo "Command failed with exit code $code"
              exit "$code"
            fi
          fi
          echo "Deployed for tag ${{ github.ref_name }}"
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          WRANGLER_TOML_CONTENT: ${{ secrets.BACKEND_TOML }}
          ADMIN_PASSWORDS: ${{ secrets.ADMIN_PASSWORDS }}
